<div class = "space-y-4 animate-fade-in">

    
    {% if size_warning %}
    <div class="mb-6 p-4 bg-yellow-50 border-l-4 border-yellow-500 text-yellow-800 rounded shadow-sm">
        <p class='font-bold flex items-center gap-2'>
            <span>⚠️</span> Poster Size Exceeded
        </p>
        <p class="text-sm mt-1">{{ size_warning }}</p>
    </div>
    {% endif %}
        
    <div class="mb-6">
        <label class="block text-sm font-bold text-gray-700 mb-2">Research Abstract</label>
        <textarea
            name="abstract"
            class="w-full border border-gray-300 rounded-lg p-3 shadow-sm"
            rows="6"
        >{{ abstract }}</textarea>
    </div>


    {% if vision_metadata %}
    <div class= "mt-8 border-t-2 pt-6">
        <label class="block text-xs font-bold text-indigo-500 uppercase mb-3">Analyzed Figures</label>
        <div class="grid grid-cols-1 gap-4">

            {% for figure in vision_metadata %}
            <div class="p-4 bg-indigo-50 border border-indigo-100 rounded-lg shadow-sm">
                <p class="font-bold text-indigo-900 text-sm mb-1">Figure Analysis</p>
                <p class="text-sm text-gray-800"><strong>Caption:</strong> {{ figure.figure_caption }}</p>
                <p class="text-xs text-gray-600 mt-2"><strong>AI Summary:</strong> {{ figure.detailed_analysis }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <form action="/api/download-pptx" method="POST">
        <input type="hidden" name="vision_data" value="{{ vision_metadata | tojson | forceescape }}">

        <input type="hidden" name="conference_rules_json" value="{{ conference_rules_json | forceescape }}">
        <label>Title</label>
        <textarea name="title" class="w-full h-32 border p-2">{{ bullets.title}}</textarea>
    
        <label>Introduction</label>
        <textarea name="introduction" class="w-full h-32 border p-2">{{ bullets.introduction_bullets | join('\n') }}</textarea>

        <label>Problem Gap</label>
        <textarea name="problem" class="w-full h-32 border p-2">{{ bullets.problem_gap_bullets | join('\n') }}</textarea>

        <label>Research Goal</label>
        <textarea name="research_goals" class="w-full h-32 border p-2">{{ bullets.research_goal_bullets | join('\n') }}</textarea>

        <label>Method</label>
        <textarea name="methods" class="w-full h-32 border p-2">{{ bullets.method_bullets | join('\n') }}</textarea>

        <label>Results</label>
        <textarea name="results" class="w-full h-32 border p-2">{{ bullets.result_bullets | join('\n') }}</textarea>

        <label>Conclusion</label>
        <textarea name="conclusion" class="w-full h-32 border p-2">{{ bullets.conclusion_bullets | join('\n') }}</textarea>

        <button type="submit" class="w-full mt-6 bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 shadow-md">
            Export to .PPTX
        </button>
    </form>

</div>
